<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="42%" cy="44%" r="70%">
      <stop offset="0" stop-color="#f3eadf"/>
      <stop offset="0.55" stop-color="#c9b9a6"/>
      <stop offset="1" stop-color="#8b827c"/>
    </radialGradient>
    <linearGradient id="cup" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e7e7e7"/>
    </linearGradient>
    <linearGradient id="coffee" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a1f16"/>
      <stop offset="1" stop-color="#1b0f0b"/>
    </linearGradient>
    <linearGradient id="rose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff3b3b"/>
      <stop offset="1" stop-color="#b80018"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#51c96a"/>
      <stop offset="1" stop-color="#1f7f37"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- soft background like in the reference image -->
  <rect x="0" y="0" width="64" height="64" fill="url(#bg)"/>

  <!-- plate -->
  <g filter="url(#shadow)">
    <ellipse cx="28" cy="44" rx="20" ry="9" fill="#f7f7f7" opacity="0.95"/>
    <ellipse cx="28" cy="44" rx="16" ry="6.8" fill="#ececec"/>
  </g>

  <!-- cup -->
  <g filter="url(#shadow)">
    <path d="M14 26c0-3 2.5-5.5 5.5-5.5h17c3 0 5.5 2.5 5.5 5.5v14c0 6-4.5 10-11 10H25c-6.5 0-11-4-11-10V26z" fill="url(#cup)"/>
    <path d="M18 24h20c2.4 0 4 1.6 4 4v4c0 0-2.6-2-14-2s-14 2-14 2v-4c0-2.4 1.6-4 4-4z" fill="#ffffff" opacity="0.7"/>

    <!-- coffee surface -->
    <ellipse cx="28" cy="28" rx="14" ry="6" fill="url(#coffee)"/>
    <ellipse cx="28" cy="28" rx="12" ry="4.6" fill="#2b160f" opacity="0.65"/>

    <!-- handle -->
    <path d="M42 30c7 0 11 4 11 9s-4 9-11 9" fill="none" stroke="#dedede" stroke-width="5" stroke-linecap="round"/>
    <path d="M42 33c4.8 0 7.5 2.7 7.5 6s-2.7 6-7.5 6" fill="none" stroke="#f6f6f6" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- steam -->
  <g opacity="0.55" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round">
    <path d="M24 14c-3 4 2 6 0 10"/>
    <path d="M30 12c-3 4 2 6 0 10"/>
    <path d="M36 14c-3 4 2 6 0 10"/>
  </g>

  <!-- coffee beans -->
  <g filter="url(#shadow)">
    <ellipse cx="18" cy="45" rx="4.2" ry="3" fill="#4b2a1d"/>
    <path d="M15.5 45c2 1.7 4.5 1.7 5.8 0" fill="none" stroke="#2a140c" stroke-width="1.2" stroke-linecap="round"/>
    <ellipse cx="24" cy="46.5" rx="4.2" ry="3" fill="#4b2a1d"/>
    <path d="M21.5 46.5c2 1.7 4.5 1.7 5.8 0" fill="none" stroke="#2a140c" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <!-- leaves + rose (simplified) -->
  <g transform="translate(36 40)" filter="url(#shadow)">
    <path d="M-2 6c4-6 10-7 14-2-6 5-12 6-14 2z" fill="url(#leaf)"/>
    <path d="M2 10c5-3 10-2 12 3-6 2-11 1-12-3z" fill="url(#leaf)" opacity="0.95"/>

    <g transform="translate(6 2)">
      <circle cx="8" cy="10" r="9" fill="url(#rose)"/>
      <path d="M8 4c3 0 6 3 3 6-2 2-5 2-6 0-1-2 1-6 3-6z" fill="#ff6a6a" opacity="0.85"/>
      <path d="M8 7c2 0 3.7 2 .8 3.7-1.3.7-2.8.5-3.2-.2-.5-.8.6-3.5 2.4-3.5z" fill="#ffb0b0" opacity="0.75"/>
      <path d="M6.3 11.2c1.5 1.1 4 .9 5.4-.4" fill="none" stroke="#8b0015" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
    </g>
  </g>
</svg>
